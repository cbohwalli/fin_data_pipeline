services:
  db:
    build: ./database  
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./scripts       
    env_file: .env
    depends_on:
      db:
        condition: service_healthy 
    restart: on-failure

  dbt:
    build: ./dbt
    container_name: dbt_transform
    env_file: .env
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      db:
        condition: service_healthy
    profiles: ["dbt_only"]

volumes:
  pgdata: 